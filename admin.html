<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者入口 — 動支單系統 v2.4.4</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; font-size: 14px;
       background: #f0f2f5; color: #1a1a2e; }

/* ── Login ── */
#login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1e2a38 0%, #2e4057 100%);
}
#login-box {
  background: #fff; border-radius: 12px; padding: 40px 44px;
  width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,.3); text-align: center;
}
#login-box h2 { font-size: 20px; margin-bottom: 6px; color: #1e2a38; }
#login-box p  { font-size: 12px; color: #78909c; margin-bottom: 24px; }
#pass { width: 100%; padding: 10px 14px; border: 1px solid #cfd8dc;
        border-radius: 6px; font-size: 14px; outline: none; margin-bottom: 12px; }
#pass:focus { border-color: #1976d2; }
#login-btn {
  width: 100%; padding: 10px; background: #1565c0; color: #fff;
  border: none; border-radius: 6px; font-size: 14px; cursor: pointer;
}
#login-btn:hover { background: #1976d2; }
#login-err { color: #e53935; font-size: 12px; margin-top: 10px; min-height: 18px; }

/* ── Panel ── */
#panel { display: none; min-height: 100vh; flex-direction: column; }

#top-bar {
  background: #1e2a38; color: #fff; padding: 0 24px;
  display: flex; align-items: center; height: 52px; gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
#top-bar h1 { font-size: 16px; font-weight: 600; flex: 1; }
#logout-btn {
  padding: 5px 14px; background: #37474f; color: #cfd8dc;
  border: none; border-radius: 4px; font-size: 12px; cursor: pointer;
}
#logout-btn:hover { background: #455a64; }
.link-btn {
  padding: 5px 14px; background: #1565c0; color: #fff;
  border: none; border-radius: 4px; font-size: 12px; cursor: pointer; text-decoration: none;
}
.link-btn:hover { background: #1976d2; }

/* ── Tab nav ── */
#tab-nav {
  background: #263545; display: flex; padding: 0 24px; gap: 2px;
}
.tab-btn {
  padding: 12px 20px; background: transparent; color: #90a4ae;
  border: none; font-size: 13px; cursor: pointer; border-bottom: 3px solid transparent;
}
.tab-btn:hover { color: #cfd8dc; }
.tab-btn.active { color: #fff; border-bottom-color: #42a5f5; }

/* ── Content ── */
#content { flex: 1; padding: 24px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  flex-wrap: wrap;
}
.btn { padding: 7px 16px; border: none; border-radius: 5px; font-size: 13px; cursor: pointer; }
.btn-blue  { background: #1565c0; color: #fff; }
.btn-blue:hover  { background: #1976d2; }
.btn-green { background: #2e7d32; color: #fff; }
.btn-green:hover { background: #388e3c; }
.btn-red   { background: #c62828; color: #fff; }
.btn-red:hover   { background: #e53935; }
.btn-gray  { background: #546e7a; color: #fff; }
.btn-gray:hover  { background: #607d8b; }
.toolbar-msg { font-size: 12px; color: #43a047; }
.toolbar-err { font-size: 12px; color: #e53935; }

/* ── Subjects tree ── */
.acct-card {
  background: #fff; border-radius: 8px; margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1); overflow: hidden;
}
.acct-header {
  background: #1e2a38; color: #fff; padding: 10px 16px;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.acct-header .acct-name { flex: 1; font-weight: 600; font-size: 14px; }
.acct-header .acct-code { font-size: 11px; color: #78909c; }
.acct-header .icon-btn {
  background: rgba(255,255,255,.15); color: #fff; border: none;
  border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer;
}
.acct-header .icon-btn:hover { background: rgba(255,255,255,.25); }
.acct-body { padding: 0 0 8px 0; }

.bp-row {
  display: flex; align-items: flex-start; padding: 6px 16px;
  border-bottom: 1px solid #f5f5f5; gap: 8px;
}
.bp-row:last-child { border-bottom: none; }
.bp-info { flex: 1; }
.bp-title { font-size: 13px; font-weight: 600; color: #1565c0; }
.bp-sub   { font-size: 11px; color: #78909c; margin-top: 1px; }
.bp-purposes { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
.purpose-tag {
  background: #e3f2fd; color: #1565c0; border-radius: 12px;
  padding: 2px 8px; font-size: 11px; display: flex; align-items: center; gap: 4px;
}
.purpose-tag .del { cursor: pointer; color: #90a4ae; font-size: 10px; }
.purpose-tag .del:hover { color: #e53935; }
.add-purpose-btn {
  background: #f5f5f5; color: #546e7a; border: 1px dashed #b0bec5;
  border-radius: 12px; padding: 2px 8px; font-size: 11px; cursor: pointer;
}
.add-purpose-btn:hover { background: #e3f2fd; border-color: #1976d2; color: #1976d2; }
.bp-actions { display: flex; gap: 4px; flex-shrink: 0; padding-top: 2px; }
.bp-actions button {
  padding: 3px 8px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer;
}
.btn-edit-sm { background: #e3f2fd; color: #1565c0; }
.btn-edit-sm:hover { background: #bbdefb; }
.btn-del-sm  { background: #fce4ec; color: #c62828; }
.btn-del-sm:hover  { background: #f8bbd0; }

.add-bp-btn {
  margin: 6px 16px 0; padding: 6px 12px; background: #f5f5f5;
  border: 1px dashed #b0bec5; border-radius: 6px; font-size: 12px;
  color: #546e7a; cursor: pointer; width: calc(100% - 32px);
}
.add-bp-btn:hover { background: #e8f5e9; border-color: #388e3c; color: #2e7d32; }
.add-acct-btn {
  width: 100%; padding: 10px; background: #fff; border: 2px dashed #b0bec5;
  border-radius: 8px; font-size: 13px; color: #546e7a; cursor: pointer; margin-top: 4px;
}
.add-acct-btn:hover { background: #e8f5e9; border-color: #388e3c; color: #2e7d32; }

/* ── Records table ── */
.rec-table { width: 100%; border-collapse: collapse; background: #fff;
             border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
.rec-table th {
  background: #263545; color: #cfd8dc; padding: 10px 14px;
  text-align: left; font-size: 12px; font-weight: 600;
}
.rec-table td { padding: 9px 14px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.rec-table tr:last-child td { border-bottom: none; }
.rec-table tr:hover td { background: #fafafa; }
.rec-amount { font-weight: bold; color: #1565c0; }
.no-data { text-align: center; color: #90a4ae; padding: 32px !important; }

/* ── Reports ── */
.stats-row {
  display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap;
}
.stat-card {
  background: #fff; border-radius: 8px; padding: 16px 22px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1); min-width: 130px; text-align: center;
}
.stat-num   { font-size: 26px; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: 12px; color: #78909c; margin-top: 2px; }
.rpt-subtabs { display: flex; gap: 2px; border-bottom: 2px solid #e0e0e0; margin-bottom: 0; flex-wrap: wrap; }
.rpt-tab {
  padding: 9px 20px; border: none; background: transparent; font-size: 13px;
  cursor: pointer; color: #78909c; border-bottom: 2px solid transparent; margin-bottom: -2px;
}
.rpt-tab:hover { color: #1565c0; }
.rpt-tab.active { color: #1565c0; border-bottom-color: #1565c0; font-weight: 600; }
.voided-row td { color: #90a4ae; }
.voided-row td .void-badge { color: #c62828; }
.void-badge    { background: #fce4ec; color: #c62828; border-radius: 4px; padding: 2px 6px; font-size: 11px; }
.ok-badge      { background: #e8f5e9; color: #2e7d32;  border-radius: 4px; padding: 2px 6px; font-size: 11px; }
.lock-badge    { background: #eceff1; color: #37474f;  border-radius: 4px; padding: 2px 6px; font-size: 11px; }
.archive-badge { background: #e3f2fd; color: #1565c0;  border-radius: 4px; padding: 2px 6px; font-size: 11px; }
.archived-row td { opacity: 0.55; }

/* ── Admin CSS 動畫彈窗 ── */
.adm-modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
  animation: admFadeIn .18s ease;
}
.adm-modal-box {
  background: #fff; border-radius: 12px; padding: 28px 32px; max-width: 420px; width: 92%;
  box-shadow: 0 8px 40px rgba(0,0,0,.28); text-align: center;
  animation: admSlideUp .22s cubic-bezier(.175,.885,.32,1.275);
}
.adm-modal-icon { font-size: 38px; margin-bottom: 10px; }
.adm-modal-msg  { font-size: 14px; color: #333; margin-bottom: 20px; line-height: 1.65; }
.adm-modal-btns { display: flex; gap: 10px; justify-content: center; }
.adm-prompt-input {
  width: 100%; padding: 9px 12px; border: 1.5px solid #cfd8dc; border-radius: 6px;
  font-size: 14px; font-family: inherit; outline: none; margin: 10px 0 18px;
  box-sizing: border-box;
}
.adm-prompt-input:focus { border-color: #1976d2; }
@keyframes admFadeIn   { from { opacity:0 } to { opacity:1 } }
@keyframes admSlideUp  { from { transform:translateY(22px);opacity:0 } to { transform:translateY(0);opacity:1 } }
.th-r { text-align: right; }
.td-r-admin { text-align: right; }

/* ── Settings ── */
.setting-card {
  background: #fff; border-radius: 8px; padding: 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 480px;
}
.setting-card h3 { font-size: 15px; margin-bottom: 18px; color: #1e2a38; }
.s-row { margin-bottom: 14px; }
.s-row label { display: block; font-size: 12px; color: #546e7a; margin-bottom: 4px; }
.s-row input {
  width: 100%; padding: 8px 12px; border: 1px solid #cfd8dc;
  border-radius: 5px; font-size: 14px; outline: none;
}
.s-row input:focus { border-color: #1976d2; }

/* ── Budget chart ── */
.budget-section { background: #fff; border-radius: 8px; padding: 20px 24px;
                  box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-top: 16px; }
.budget-section h4 { font-size: 14px; font-weight: 600; color: #1e2a38; margin-bottom: 18px; }
.budget-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.budget-label { width: 190px; font-size: 13px; color: #37474f; flex-shrink: 0; }
.budget-bar-wrap { flex: 1; height: 22px; background: #eceff1; border-radius: 4px; overflow: hidden; position: relative; }
.budget-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; min-width: 2px; }
.budget-info { width: 230px; font-size: 13px; flex-shrink: 0; text-align: right; color: #546e7a; }
.budget-info strong { font-size: 13px; }
.budget-no-data { color: #90a4ae; font-size: 13px; padding: 16px 0; }

/* ── Modal ── */
#modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 999;
  align-items: center; justify-content: center;
}
#modal-bg.open { display: flex; }
#modal-box {
  background: #fff; border-radius: 10px; padding: 28px 32px;
  min-width: 380px; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,.25);
}
#modal-box h3 { font-size: 16px; margin-bottom: 18px; color: #1e2a38; }
.m-row { margin-bottom: 12px; }
.m-row label { display: block; font-size: 12px; color: #546e7a; margin-bottom: 3px; }
.m-row input {
  width: 100%; padding: 8px 12px; border: 1px solid #cfd8dc;
  border-radius: 5px; font-size: 14px; outline: none;
}
.m-row input:focus { border-color: #1976d2; }
.modal-hint { font-size: 11px; color: #90a4ae; margin-top: 3px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-btns button { padding: 8px 20px; border: none; border-radius: 5px; font-size: 13px; cursor: pointer; }
#modal-ok { background: #1565c0; color: #fff; }
#modal-ok:hover { background: #1976d2; }
#modal-cancel { background: #eceff1; color: #37474f; }
#modal-cancel:hover { background: #cfd8dc; }

/* ── Export tables ── */
.export-section { background:#fff; border-radius:8px; padding:18px 20px;
                  box-shadow:0 1px 4px rgba(0,0,0,.1); margin-bottom:16px; }
.export-section h4 { font-size:14px; font-weight:600; color:#1e2a38; margin-bottom:10px; }
.export-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.sel-count { font-size:12px; color:#546e7a; margin-left:4px; }
.export-table-wrap { overflow-x:auto; max-height:400px; overflow-y:auto; }
.export-table { width:100%; border-collapse:collapse; font-size:12px; }
.export-table th { background:#263545; color:#cfd8dc; padding:7px 10px;
                   text-align:left; font-size:11px; font-weight:600; position:sticky; top:0; z-index:1; }
.export-table td { padding:6px 10px; border-bottom:1px solid #f5f5f5; }
.export-table tr:hover td { background:#fafafa; }
.export-table tr.voided-row td { color:#90a4ae; }
.export-table td:first-child { width:32px; text-align:center; }
.export-table th:first-child { width:32px; text-align:center; }
/* income stat cards */
.income-cards { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.income-card { background:#fff; border-radius:8px; padding:14px 18px;
               box-shadow:0 1px 4px rgba(0,0,0,.1); min-width:160px; flex:1; }
.income-card .ic-label { font-size:11px; color:#546e7a; margin-bottom:4px; }
.income-card .ic-count { font-size:13px; font-weight:600; color:#1e2a38; }
.income-card .ic-amt   { font-size:18px; font-weight:700; color:#1565c0; margin-top:2px; }
/* purpose sub-tabs inside pane */
.purpose-subtabs { display:flex; gap:2px; border-bottom:2px solid #e0e0e0; margin-bottom:12px; }
.purpose-tab { padding:7px 18px; border:none; background:transparent; font-size:13px;
               cursor:pointer; color:#78909c; border-bottom:2px solid transparent; margin-bottom:-2px; }
.purpose-tab.active { color:#1565c0; border-bottom-color:#1565c0; font-weight:600; }

/* ── Record edit modal ── */
#rec-edit-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.52); z-index: 1000;
  align-items: flex-start; justify-content: center;
  overflow-y: auto; padding: 24px 12px;
}
#rec-edit-modal.open { display: flex; }
#rec-edit-box {
  background: #fff; border-radius: 10px; padding: 28px 32px;
  width: 100%; max-width: 780px; box-shadow: 0 8px 40px rgba(0,0,0,.3);
  margin: auto;
}
#rec-edit-box h3 { font-size: 16px; margin-bottom: 20px; color: #1e2a38; }
.re-row { margin-bottom: 14px; }
.re-row label { display: block; font-size: 12px; color: #546e7a; margin-bottom: 4px; font-weight: 600; }
.re-row input, .re-row textarea {
  width: 100%; padding: 8px 12px; border: 1px solid #cfd8dc;
  border-radius: 5px; font-size: 13px; outline: none; font-family: inherit;
}
.re-row input:focus, .re-row textarea:focus { border-color: #1976d2; }
.re-row textarea { resize: vertical; min-height: 60px; }
.re-items-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.re-items-table th {
  background: #263545; color: #cfd8dc; padding: 7px 8px;
  text-align: left; font-size: 11px;
}
.re-items-table td { padding: 3px 3px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
.re-items-table td input {
  width: 100%; padding: 5px 7px; border: 1px solid #cfd8dc;
  border-radius: 4px; font-size: 12px; outline: none; font-family: inherit;
}
.re-items-table td input:focus { border-color: #1976d2; }
.re-del-row { background: none; border: none; color: #e53935; cursor: pointer; font-size: 16px; padding: 2px 5px; line-height: 1; }
.re-del-row:hover { color: #c62828; }
.re-total-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 10px; font-size: 14px; }
.re-total-val { font-weight: 700; font-size: 20px; color: #1565c0; }
.re-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px;
           border-top: 1px solid #eceff1; padding-top: 16px; align-items: center; }
.re-btns button { padding: 9px 24px; border: none; border-radius: 5px; font-size: 13px; cursor: pointer; }
#re-save   { background: #1565c0; color: #fff; }
#re-save:hover { background: #1976d2; }
#re-cancel { background: #eceff1; color: #37474f; }
#re-cancel:hover { background: #cfd8dc; }
#re-msg { font-size: 12px; color: #e53935; flex: 1; }

/* ── Budget year accordion ── */
.byr-block { border:1px solid #dde3ef; border-radius:8px; margin-bottom:8px; overflow:hidden; }
.byr-header {
  display:flex; align-items:center; gap:10px; padding:11px 16px;
  background:#263545; color:#fff; cursor:pointer; user-select:none;
}
.byr-header:hover { background:#2e4057; }
.byr-title { font-size:14px; font-weight:600; flex:1; }
.byr-summary { font-size:11px; color:#90a4ae; }
.byr-arrow { font-size:11px; transition:transform .2s; }
.byr-header.open .byr-arrow { transform:rotate(180deg); }
.byr-body { display:none; padding:16px; background:#fff; }
.byr-body.open { display:block; }
.byr-add {
  width:100%; padding:10px; background:#fff; border:2px dashed #b0bec5;
  border-radius:8px; font-size:13px; color:#546e7a; cursor:pointer; margin-top:4px;
}
.byr-add:hover { background:#e8f5e9; border-color:#388e3c; color:#2e7d32; }
</style>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-wrap">
  <div id="login-box">
    <h2>🔒 管理者入口</h2>
    <p>臺南市佳里區衛生所 — 動支單系統</p>
    <p style="font-size:11px; color:#b0bec5; margin-top:-18px; margin-bottom:20px; letter-spacing:.5px;">v2.4.4</p>
    <input type="password" id="pass" placeholder="輸入管理密碼"
           onkeydown="if(event.key==='Enter')login()">
    <button id="login-btn" onclick="login()">登入</button>
    <div id="login-err"></div>
    <a href="/" style="display:block; margin-top:14px; padding:9px;
       background:#eceff1; color:#546e7a; border-radius:6px;
       font-size:13px; text-decoration:none; text-align:center;">
      ← 回填單頁面
    </a>
  </div>
</div>

<!-- ═══ ADMIN PANEL ═══ -->
<div id="panel">
  <div id="top-bar">
    <h1>⚙️ 動支單 管理者入口</h1>
    <span style="font-size:11px; color:#78909c; letter-spacing:.5px;">v2.4.4</span>
    <a class="link-btn" href="/" target="_blank">開啟填單頁面 ↗</a>
    <button id="logout-btn" onclick="logout()">登出</button>
  </div>
  <div id="tab-nav">
    <button class="tab-btn active" onclick="showTab('subjects')">📚 科目管理</button>
    <button class="tab-btn"        onclick="showTab('records')">📋 紀錄管理</button>
    <button class="tab-btn"        onclick="showTab('reports')">📊 報表</button>
    <button class="tab-btn"        onclick="showTab('settings')">🔧 系統設定</button>
  </div>
  <div id="content">

    <!-- ── Tab: subjects ── -->
    <div id="tab-subjects" class="tab-pane active">
      <div class="toolbar">
        <button class="btn btn-green" onclick="addMainAcct()">＋ 新增主科目</button>
        <button class="btn btn-blue"  onclick="saveSubjects()">💾 儲存全部科目</button>
        <button class="btn btn-gray"  onclick="loadSubjects()">🔄 重新載入</button>
        <span id="subj-msg" class="toolbar-msg"></span>
      </div>
      <div id="subjects-tree"></div>
    </div>

    <!-- ── Tab: records ── -->
    <div id="tab-records" class="tab-pane">
      <div class="toolbar">
        <button class="btn btn-gray"  onclick="loadRecords()">🔄 重新載入</button>
        <button class="btn btn-blue"  onclick="exportCSV()">⬇ 匯出 CSV</button>
        <button class="btn" style="background:#37474f;color:#fff;" onclick="bulkLock(true)">🔒 批次鎖定</button>
        <button class="btn" style="background:#546e7a;color:#fff;" onclick="bulkLock(false)">🔓 批次解鎖</button>
        <button class="btn" style="background:#1565c0;color:#fff;" onclick="bulkRestore()">↩️ 批次還原</button>
        <button class="btn" style="background:#0d47a1;color:#fff;" onclick="bulkArchive(true)">🗄 批次封存</button>
        <button class="btn" style="background:#1976d2;color:#fff;" onclick="bulkArchive(false)">📂 批次取消封存</button>

<script>
'use strict';

/* ════════════════════
   STATE
   ════════════════════ */
let PASS    = '';
let subjects = null;  /* current subjects object */
let modalCb  = null;  /* modal callback */

const BUDGET_YEAR_FIELDS = [
  { key:'b1301',        label:'1301 延長工時加班費',              def:140000 },
  { key:'b2807_public', label:'2807 委託檢驗費 — 公立醫院',       def:60000  },
  { key:'b2807_health', label:'2807 委託檢驗費 — 衛生局',         def:210635 },
  { key:'b2807_clinic', label:'2807 委託檢驗費 — 醫療門診診所/檢驗所', def:137135 },
  { key:'b2807_invoice',label:'2807 委託檢驗費 — 開具發票廠商',   def:2600   },
  { key:'b2807_hpv',   label:'2807 委託檢驗費 — HPV（選填）',     def:0      },
  { key:'b2807_total', label:'2807 委託檢驗費 — 總額預算',        def:410370 },
];

/* ════════════════════
   LOGIN / LOGOUT
   ════════════════════ */
async function login() {
  const pw = document.getElementById('pass').value;
  if (!pw) return;
  document.getElementById('login-btn').textContent = '驗證中…';
  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (r.ok) {
      PASS = pw;
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('panel').style.display = 'flex';
      document.getElementById('panel').style.flexDirection = 'column';
      await loadSubjects();
      await loadRecords();
    } else {
      document.getElementById('login-err').textContent = '❌ 密碼錯誤';
    }
  } catch (_) {
    document.getElementById('login-err').textContent = '❌ 連線失敗';
  }
  document.getElementById('login-btn').textContent = '登入';
}

function logout() {
  PASS = ''; subjects = null;
  document.getElementById('panel').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('pass').value = '';
  document.getElementById('login-err').textContent = '';
}

/* ════════════════════
   TABS
   ════════════════════ */
function showTab(name) {
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'reports') loadReports();
  if (name === 'records') loadRecords();
}

/* ════════════════════
   SUBJECTS
   ════════════════════ */
async function loadSubjects() {
  setMsg('subj-msg', '⟳ 載入中…', false);
  try {
    /* 嘗試從 Gist API 取得最新版；若無則回退靜態檔 */
    let data = null;
    const r1 = await fetch('/api/subjects');
    if (r1.ok) {
      data = await r1.json();
      if (!data || !data.mainAccounts) data = null;
    }
    if (!data) {
      const r2 = await fetch('/subjects.json');
      if (r2.ok) data = await r2.json();
    }
    subjects = data || { settings:{ orgName:'臺南市佳里區衛生所', exemptThreshold:10000 }, mainAccounts:[] };
    renderTree();
    fillSettings();
    setMsg('subj-msg', '✓ 載入完成', false);
  } catch (e) {
    setMsg('subj-msg', '❌ 載入失敗', true);
  }
}

async function saveSubjects() {
  if (!subjects) return;
  setMsg('subj-msg', '⟳ 儲存中…', false);
  try {
    const r = await fetch('/api/subjects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Pass': PASS },
      body: JSON.stringify(subjects),
    });
    const res = await r.json();
    if (res.ok) setMsg('subj-msg', '✓ 已儲存', false);
    else        setMsg('subj-msg', '❌ 儲存失敗', true);
  } catch (_) {
    setMsg('subj-msg', '❌ 連線失敗', true);
  }
}

/* ── Render subjects tree ── */
function renderTree() {
  const wrap = document.getElementById('subjects-tree');
  wrap.innerHTML = '';
  (subjects.mainAccounts || []).forEach((acct, ai) => {
    const card = document.createElement('div');
    card.className = 'acct-card';
    card.innerHTML = `
      <div class="acct-header">
        <span class="acct-code">${esc(acct.code)}</span>
        <span class="acct-name">${esc(acct.name)}</span>
        <button class="icon-btn" onclick="editMainAcct(${ai})">✏️ 編輯</button>
        <button class="icon-btn" style="background:rgba(255,80,80,.3);"
                onclick="delMainAcct(${ai})">✕ 刪除</button>
      </div>
      <div class="acct-body" id="acct-body-${ai}"></div>
      <button class="add-bp-btn" onclick="addBp(${ai})">＋ 新增業務計畫</button>`;
    wrap.appendChild(card);

    const body = document.getElementById(`acct-body-${ai}`);
    (acct.businessPlans || []).forEach((bp, bi) => {
      const row = document.createElement('div');
      row.className = 'bp-row';
      const purposeHtml = (bp.purposes || []).map((p, pi) =>
        `<span class="purpose-tag">
           <span class="edit-p" onclick="editPurpose(${ai},${bi},${pi})" title="編輯" style="cursor:pointer; color:#1565c0; margin-right:2px;">✏</span>
           ${esc(p.code)} ${esc(p.name)}
           <span class="del" onclick="delPurpose(${ai},${bi},${pi})" title="刪除">✕</span>
         </span>`).join('') +
        `<button class="add-purpose-btn" onclick="addPurpose(${ai},${bi})">＋ 用途別</button>`;

      row.innerHTML = `
        <div class="bp-info">
          <div class="bp-title">${esc(bp.code)}　${esc(bp.name)}</div>
          <div class="bp-sub">工作計畫：${esc(bp.workPlan)}</div>
          <div class="bp-purposes">${purposeHtml}</div>
        </div>
        <div class="bp-actions">
          <button class="btn-edit-sm" onclick="editBp(${ai},${bi})">✏️</button>
          <button class="btn-del-sm"  onclick="delBp(${ai},${bi})">✕</button>
        </div>`;
      body.appendChild(row);
    });
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-acct-btn';
  addBtn.textContent = '＋ 新增主科目';
  addBtn.onclick = addMainAcct;
  wrap.appendChild(addBtn);
}

/* ── Main account CRUD ── */
function addMainAcct() {
  openModal('新增主科目',
    `<div class="m-row"><label>科目代碼</label><input id="m-code" placeholder="例：11010201"></div>
     <div class="m-row"><label>科目名稱</label><input id="m-name" placeholder="例：醫療基金專戶"></div>`,
    () => {
      const code = v('m-code'), name = v('m-name');
      if (!code || !name) { showAdminAlert('請填入代碼和名稱'); return false; }
      subjects.mainAccounts.push({ code, name, businessPlans: [] });
      renderTree(); setMsg('subj-msg', '已新增，請記得儲存', false);
    });
}

function editMainAcct(ai) {
  const acct = subjects.mainAccounts[ai];
  openModal('編輯主科目',
    `<div class="m-row"><label>科目代碼</label><input id="m-code" value="${esc(acct.code)}"></div>
     <div class="m-row"><label>科目名稱</label><input id="m-name" value="${esc(acct.name)}"></div>`,
    () => {
      acct.code = v('m-code'); acct.name = v('m-name');
      renderTree(); setMsg('subj-msg', '已修改，請記得儲存', false);
    });
}

async function delMainAcct(ai) {
  if (!await showAdminConfirm(`確定刪除「${subjects.mainAccounts[ai].name}」及其所有業務計畫？`)) return;
  subjects.mainAccounts.splice(ai, 1);
  renderTree(); setMsg('subj-msg', '已刪除，請記得儲存', false);
}

/* ── Business plan CRUD ── */
function addBp(ai) {
  openModal('新增業務計畫',
    `<div class="m-row"><label>業務計畫代碼</label><input id="m-code" placeholder="例：510601"></div>
     <div class="m-row"><label>業務計畫名稱</label><input id="m-name" placeholder="例：門診醫療成本"></div>
     <div class="m-row"><label>工作計畫名稱<br><span class="modal-hint">（通常與業務計畫名稱相同）</span></label>
       <input id="m-wp" placeholder="例：門診醫療成本"></div>`,
    () => {
      const code = v('m-code'), name = v('m-name'), wp = v('m-wp') || v('m-name');
      if (!code || !name) { showAdminAlert('請填入代碼和名稱'); return false; }
      subjects.mainAccounts[ai].businessPlans.push({ code, name, workPlan: wp, purposes: [] });
      renderTree(); setMsg('subj-msg', '已新增，請記得儲存', false);
    });
}

function editBp(ai, bi) {
  const bp = subjects.mainAccounts[ai].businessPlans[bi];
  openModal('編輯業務計畫',
    `<div class="m-row"><label>業務計畫代碼</label><input id="m-code" value="${esc(bp.code)}"></div>
     <div class="m-row"><label>業務計畫名稱</label><input id="m-name" value="${esc(bp.name)}"></div>
     <div class="m-row"><label>工作計畫名稱</label><input id="m-wp"   value="${esc(bp.workPlan)}"></div>`,
    () => {
      bp.code = v('m-code'); bp.name = v('m-name'); bp.workPlan = v('m-wp');
      renderTree(); setMsg('subj-msg', '已修改，請記得儲存', false);
    });
}

async function delBp(ai, bi) {
  const bp = subjects.mainAccounts[ai].businessPlans[bi];
  if (!await showAdminConfirm(`確定刪除業務計畫「${bp.name}」？`)) return;
  subjects.mainAccounts[ai].businessPlans.splice(bi, 1);
  renderTree(); setMsg('subj-msg', '已刪除，請記得儲存', false);
}

/* ── Purpose CRUD ── */
function addPurpose(ai, bi) {
  openModal('新增用途別',
    `<div class="m-row"><label>用途別代碼</label><input id="m-code" placeholder="例：2706"></div>
     <div class="m-row"><label>用途別名稱</label><input id="m-name" placeholder="例：護理人員訓練費"></div>`,
    () => {
      const code = v('m-code'), name = v('m-name');
      if (!code || !name) { showAdminAlert('請填入代碼和名稱'); return false; }
      subjects.mainAccounts[ai].businessPlans[bi].purposes.push({ code, name });
      renderTree(); setMsg('subj-msg', '已新增，請記得儲存', false);
    });
}

function editPurpose(ai, bi, pi) {
  const p = subjects.mainAccounts[ai].businessPlans[bi].purposes[pi];
  openModal('編輯用途別',
    `<div class="m-row"><label>用途別代碼</label><input id="m-code" value="${esc(p.code)}"></div>
     <div class="m-row"><label>用途別名稱</label><input id="m-name" value="${esc(p.name)}"></div>`,
    () => {
      const code = v('m-code'), name = v('m-name');
      if (!code || !name) { showAdminAlert('請填入代碼和名稱'); return false; }
      subjects.mainAccounts[ai].businessPlans[bi].purposes[pi] = { code, name };
      renderTree(); setMsg('subj-msg', '已修改，請記得儲存', false);
    });
}

async function delPurpose(ai, bi, pi) {
  const p = subjects.mainAccounts[ai].businessPlans[bi].purposes[pi];
  if (!await showAdminConfirm(`確定刪除用途別「${p.code} ${p.name}」？`)) return;
  subjects.mainAccounts[ai].businessPlans[bi].purposes.splice(pi, 1);
  renderTree(); setMsg('subj-msg', '已刪除，請記得儲存', false);
}

/* ════════════════════
   RECORDS
   ════════════════════ */
async function loadRecords() {
  setMsg('rec-msg', '⟳ 載入中…', false);
  try {
    const records = await (await fetch('/api/records?all=1')).json();
    const archived = records.filter(r =>  r.archived).length;
    const active   = records.filter(r => !r.archived);
    const valid    = active.filter(r => !r.voided).length;
    const voided   = active.filter(r =>  r.voided).length;
    document.getElementById('rec-count').textContent =
      `共 ${records.length} 筆（有效 ${valid}，作廢 ${voided}，封存 ${archived}）`;
    const tbody = document.getElementById('records-body');
    tbody.innerHTML = '';
    if (records.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="no-data">尚無紀錄</td></tr>';
    } else {
      [...records].sort((a, b) => {
        const numA = parseInt((a.voucherNo || '').replace(/\D/g, '')) || 0;
        const numB = parseInt((b.voucherNo || '').replace(/\D/g, '')) || 0;
        return numB - numA;
      }).forEach(rec => {
        const isArchived= !!rec.archived;
        const isVoid    = !!rec.voided;
        const isLocked  = !!rec.locked;
        const isPrinted = !!rec.printed;
        const tr = document.createElement('tr');
        if (isArchived) tr.className = 'archived-row';
        else if (isVoid) tr.className = 'voided-row';
        const isActuallyLocked = isLocked || isPrinted;
        const statusBadge = isArchived
          ? '<span class="archive-badge">🗄 已封存</span>'
          : (isVoid
              ? '<span class="void-badge">⛔ 已作廢</span>'
              : (isActuallyLocked
                  ? '<span class="lock-badge">🔒 已鎖定</span>'
                  : '<span class="ok-badge">✓ 未鎖定</span>'));
        tr.innerHTML = `
          <td><input type="checkbox" data-id="${rec.id}" data-voided="${isVoid}" data-archived="${isArchived}" onchange="updateSelCount('rec-table')"></td>
          <td>${esc(rec.voucherNo||'—')}</td>
          <td>${rec.formType==='expense'?'動支單':'請購單'}</td>
          <td>${esc(rec.acctName||'')}</td>
          <td>${esc(bpLabelName(rec.bpLabel))}</td>
          <td>${esc(rec.applyDateRoc||rec.applyDateRaw||'')}</td>
          <td class="rec-amount td-r-admin">$${Number(rec.total||0).toLocaleString('zh-TW')}</td>
          <td style="text-align:center;">${statusBadge}</td>
          <td>${esc(rec.savedAt||'')}</td>
          <td style="white-space:nowrap; display:flex; gap:4px; flex-wrap:wrap;">
            ${isArchived
              ? `<button class="btn" style="padding:4px 10px;font-size:11px;background:#e3f2fd;color:#1565c0;"
                   onclick="archiveRecord('${rec.id}',false)">📂 取消封存</button>`
              : isVoid
                ? `<button class="btn" style="padding:4px 10px;font-size:11px;background:#e3f2fd;color:#1565c0;"
                     onclick="restoreVoid('${rec.id}')">↩️ 還原</button>
                   <button class="btn" style="padding:4px 10px;font-size:11px;background:#0d47a1;color:#fff;"
                     onclick="archiveRecord('${rec.id}',true)">🗄 封存</button>`
                : isActuallyLocked
                  ? `<button class="btn" style="padding:4px 10px;font-size:11px;background:#e8f5e9;color:#2e7d32;"
                       onclick="toggleLock('${rec.id}',false)">🔓 解鎖</button>
                     <button class="btn" style="padding:4px 10px;font-size:11px;background:#0d47a1;color:#fff;"
                       onclick="archiveRecord('${rec.id}',true)">🗄 封存</button>`
                  : `<button class="btn" style="padding:4px 10px;font-size:11px;background:#37474f;color:#fff;"
                       onclick="toggleLock('${rec.id}',true)">🔒 鎖定</button>
                     <button class="btn" style="padding:4px 10px;font-size:11px;background:#0d47a1;color:#fff;"
                       onclick="archiveRecord('${rec.id}',true)">🗄 封存</button>`
            }
          </td>`;
        tbody.appendChild(tr);
      });
    }
    setMsg('rec-msg', '✓ 已載入', false);
  } catch (_) {
    setMsg('rec-msg', '❌ 載入失敗', true);
  }
}

/* 從已載入的 subjects 資料查詢用途別名稱 */
function lookupPurposeName(bpCode, purposeCode) {
  if (!subjects || !bpCode || !purposeCode) return '';
  for (const acct of (subjects.mainAccounts||[])) {
    for (const bp of (acct.businessPlans||[])) {
      if (bp.code === bpCode) {
        const p = (bp.purposes||[]).find(p => p.code === purposeCode);
        return p ? p.name : '';
      }
    }
  }
  return '';
}

/* bpLabel 舊格式為 "代碼　名稱"，新格式僅名稱；統一取名稱部分 */
function bpLabelName(label) {
  if (!label) return '';
  /* 全形空白分隔時取後半；否則原樣 */
  const idx = label.indexOf('　');
  return idx >= 0 ? label.slice(idx + 1) : label;
}

function downloadCSV(records, filename) {
  const hdr = ['憑證編號','類型','申請日期','主科目代碼','主科目名稱',
               '業務計畫代碼','業務計畫名稱','用途別代碼','用途別名稱','用途說明',
               '人員類別代碼','人員類別名稱','金額','狀態','儲存時間'];
  const rows = records.map(r => [
    r.voucherNo||'', r.formType==='expense'?'動支單':'請購單',
    r.applyDateRoc||r.applyDateRaw||'',
    r.acctCode||'', r.acctName||'',
    r.bpCode||'', bpLabelName(r.bpLabel),
    r.purposeCode||'',
    r.purposeName || lookupPurposeName(r.bpCode, r.purposeCode),
    r.purposeDesc||'',
    r.personnelCode||'', r.personnelName||'',
    r.total||0, r.voided?'作廢':'有效', r.savedAt||''
  ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv = '\uFEFF' + hdr.join(',') + '\n' + rows.join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),
    download: filename
  });
  a.click(); URL.revokeObjectURL(a.href);
}

async function toggleLock(id, lock) {
  const label = lock ? '鎖定' : '解鎖';
  const ok = await showAdminConfirm(`確定要<strong>${label}</strong>此筆紀錄？${!lock ? '<br>解鎖後使用者可在填單頁面修改。' : ''}`);
  if (!ok) return;
  setMsg('rec-msg', '⟳ 處理中…', false);
  try {
    const patch = lock ? { locked: true } : { locked: false, printed: false };
    const r = await fetch(`/api/records?id=${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patch),
    });
    if ((await r.json()).ok) { setMsg('rec-msg', `✓ 已${label}`, false); loadRecords(); }
    else setMsg('rec-msg', `❌ ${label}失敗`, true);
  } catch (_) { setMsg('rec-msg', '❌ 連線失敗', true); }
}

async function bulkLock(lock) {
  const checked = [...document.querySelectorAll('#rec-table tbody input[type=checkbox]:checked')];
  if (!checked.length) { showAdminAlert('請先勾選要操作的紀錄。'); return; }
  const label = lock ? '鎖定' : '解鎖';
  const ok = await showAdminConfirm(`確定要<strong>${label}</strong>已選取的 ${checked.length} 筆紀錄？`);
  if (!ok) return;
  setMsg('rec-msg', `⟳ 批次${label}中…`, false);
  try {
    const patch = lock ? { locked: true } : { locked: false, printed: false };
    await Promise.all(checked.map(cb =>
      fetch(`/api/records?id=${encodeURIComponent(cb.dataset.id)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(patch),
      })
    ));
    setMsg('rec-msg', `✓ 已${label} ${checked.length} 筆`, false);
    loadRecords();
  } catch (_) { setMsg('rec-msg', '❌ 操作失敗', true); }
}

  if (!ok) return;

      method: 'PATCH',

  } catch (_) { setMsg('rec-msg', '❌ 連線失敗', true); }
}

function renderBudgetChart() {
  const s   = subjects?.settings || {};
  const rocYear = String(new Date().getFullYear() - 1911);
  const yr  = s.budgets?.[rocYear] || s.budgets?.['115'] || {};
  /* fall back to old flat keys for backward compat */
  const b1301        = yr.b1301        ?? s.budget1301          ?? 140000;
  const b2807_public = yr.b2807_public ?? s.budget2807_public   ?? 60000;
  const b2807_health = yr.b2807_health ?? s.budget2807_health   ?? 210635;
  const b2807_clinic = yr.b2807_clinic ?? s.budget2807_clinic   ?? 137135;
  const b2807_invoice= yr.b2807_invoice?? s.budget2807_invoice  ?? 2600;
  const b2807_hpv    = yr.b2807_hpv    ?? s.budget2807_hpv      ?? 0;
  const total2807Budget = yr.b2807_total ?? s.budget2807_total ?? 410370;
  const active = _rptRecords.filter(r => !r.voided);
  const total2807Spent  = active.filter(r => r.purposeCode === '2807')
                                .reduce((sum, r) => sum + (Number(r.total)||0), 0);

  const titleEl = document.getElementById('budget-chart-title');
  if (titleEl) titleEl.textContent = rocYear + '年預算執行率';

  const wrap = document.getElementById('budget-chart-wrap');
  if (!wrap) return;

  const items = [
    { label: '1301 延長工時加班費',          code: '1301', acctType: null,
      budget: b1301 },
    { label: '2807 委託檢驗費　【總額】',    code: '_2807total', acctType: null,
      budget: total2807Budget, spent: total2807Spent, isTotal: true },
    { label: '　↳ 公立醫院',                code: '2807', acctType: '公立醫院',
      budget: b2807_public },
    { label: '　↳ 衛生局',                  code: '2807', acctType: '衛生局',
      budget: b2807_health },
    { label: '　↳ 醫療門診診所/檢驗所',     code: '2807', acctType: '醫療門診診所/檢驗所',
      budget: b2807_clinic },
    { label: '　↳ 開具發票廠商',            code: '2807', acctType: '開具發票廠商',
      budget: b2807_invoice },
    ...(b2807_hpv > 0 ? [
      { label: '　↳ HPV',                   code: '2807', acctType: 'HPV',
        budget: b2807_hpv }
    ] : []),
  ];

  items.forEach(item => {
    if (item.isTotal) return;  /* spent 已在外部計算 */
    item.spent = active
      .filter(r => r.purposeCode === item.code &&
                   (item.acctType === null || r.acctType === item.acctType))
      .reduce((sum, r) => sum + (Number(r.total) || 0), 0);
  });

  wrap.innerHTML = items.map(item => {
    const pct    = item.budget > 0 ? item.spent / item.budget * 100 : 0;
    const barPct = Math.min(pct, 100);
    const color  = pct >= 100 ? '#c62828' : pct >= 80 ? '#e65100' : '#2e7d32';
    const remain = item.budget - item.spent;
    const remainTxt = remain >= 0
      ? `<span style="color:#546e7a;">剩餘 $${fmtN(remain)}</span>`
      : `<span style="color:#c62828;">超支 $${fmtN(-remain)}</span>`;
    const rowStyle = item.isTotal
      ? 'background:#f0f4ff; border-radius:5px; padding:4px 6px; margin-bottom:6px;'
      : '';
    const labelStyle = item.isTotal ? 'font-weight:700; color:#1e2a38;' : '';
    return `
      <div class="budget-row" style="${rowStyle}">
        <div class="budget-label" style="${labelStyle}">${esc(item.label)}</div>
        <div class="budget-bar-wrap" title="${pct.toFixed(1)}%">
          <div class="budget-bar" style="width:${barPct}%; background:${color};"></div>
        </div>
        <div class="budget-info">
          $${fmtN(item.spent)} / $${fmtN(item.budget)}
          &nbsp;<strong style="color:${color};">${pct.toFixed(1)}%</strong>
          &nbsp;${remainTxt}
        </div>
      </div>`;
  }).join('');
}

      <td><input type="checkbox" onchange="updateSelCount('${sid}')"></td>

/* ════════════════════
   CHECKBOX / EXPORT UTILS
   ════════════════════ */
function selAll(sid) {
  document.querySelectorAll(`#${sid} tbody input[type=checkbox]`).forEach(cb=>cb.checked=true);
  updateSelCount(sid);
}
function invertSel(sid) {
  document.querySelectorAll(`#${sid} tbody input[type=checkbox]`).forEach(cb=>cb.checked=!cb.checked);
  updateSelCount(sid);
}
function selAllChk(sid, masterCb) {
  document.querySelectorAll(`#${sid} tbody input[type=checkbox]`).forEach(cb=>cb.checked=masterCb.checked);
  updateSelCount(sid);
}
function updateSelCount(sid) {
  const n = document.querySelectorAll(`#${sid} tbody input[type=checkbox]:checked`).length;
  const el = document.getElementById('cnt-'+sid);
  if (el) el.textContent = n + ' 筆已選';
}

function exportSel(sid, sheetTitle) {
  if (typeof XLSX === 'undefined') { showAdminAlert('SheetJS 尚未載入，請檢查網路連線'); return; }
  const tbl = document.getElementById(sid);
  if (!tbl) return;
  /* header row from <thead> (skip checkbox column) */
  const hdrs = [...tbl.querySelectorAll('thead th')].slice(1).map(th => th.textContent.trim());
  /* selected rows */
  const selectedRows = [...tbl.querySelectorAll('tbody tr')].filter(tr => {
    const cb = tr.querySelector('input[type=checkbox]');
    return cb && cb.checked;
  });
  if (!selectedRows.length) { showAdminAlert('請先勾選要匯出的紀錄'); return; }
  const dataRows = selectedRows.map(tr =>
    [...tr.querySelectorAll('td')].slice(1).map(td => td.textContent.trim())
  );
  const ws = XLSX.utils.aoa_to_sheet([hdrs, ...dataRows]);
  /* column widths */
  ws['!cols'] = hdrs.map((h,i) => ({ wch: Math.max(h.length*2, dataRows.reduce((m,r)=>Math.max(m,(r[i]||'').length),0)*1.5, 10) }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetTitle.slice(0,31));
  XLSX.writeFile(wb, sheetTitle + '_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

/* ════════════════════
   BUDGET YEAR ACCORDION
   ════════════════════ */
function renderBudgetYears() {
  const wrap = document.getElementById('budget-years-wrap');
  if (!wrap || !subjects) return;
  if (!subjects.settings.budgets) subjects.settings.budgets = {};
  const budgets = subjects.settings.budgets;
  const years = Object.keys(budgets).sort((a,b) => Number(b)-Number(a));
  wrap.innerHTML = years.map(yr => {
    const yd = budgets[yr];
    const tot = yd.b2807_total || 0;
    return `<div class="byr-block" id="byr-${yr}">
      <div class="byr-header" id="byr-hdr-${yr}" onclick="toggleBudgetYear('${yr}')">
        <span class="byr-title">${yr}年 預算設定</span>
        <span class="byr-summary">2807總額 $${fmtN(tot)}</span>
        <span class="byr-arrow">▼</span>
      </div>
      <div class="byr-body" id="byr-body-${yr}">
        ${BUDGET_YEAR_FIELDS.map(f => `
          <div class="s-row">
            <label>${esc(f.label)}（元）</label>
            <input type="number" min="0" id="byr-${yr}-${f.key}"
                   value="${yd[f.key] ?? f.def}"
                   oninput="onByrInput('${yr}','${f.key}',this.value)">
          </div>`).join('')}
        <div style="margin-top:12px; text-align:right;">
          <button class="btn btn-red" style="font-size:12px; padding:5px 12px;"
            onclick="removeBudgetYear('${yr}')">✕ 刪除此年度</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleBudgetYear(yr) {
  const hdr  = document.getElementById('byr-hdr-'  + yr);
  const body = document.getElementById('byr-body-' + yr);
  if (!hdr || !body) return;
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
}

async function addBudgetYear() {
  const yr = await showAdminPrompt('請輸入年度（民國年，例如 116）');
  if (!yr) return;
  if (!/^\d{3}$/.test(yr.trim())) { showAdminAlert('請輸入 3 位數民國年（例如 116）'); return; }
  const y = yr.trim();
  if (!subjects.settings.budgets) subjects.settings.budgets = {};
  if (subjects.settings.budgets[y]) { showAdminAlert(`${y}年已存在，請直接展開編輯`); return; }
  const def = {};
  BUDGET_YEAR_FIELDS.forEach(f => def[f.key] = f.def);
  subjects.settings.budgets[y] = def;
  renderBudgetYears();
  setTimeout(() => toggleBudgetYear(y), 30);
  setMsg('set-msg', `已新增 ${y}年，請記得儲存設定`, false);
}

async function removeBudgetYear(yr) {
  if (!await showAdminConfirm(`確定刪除 ${yr}年 預算設定？`)) return;
  delete subjects.settings.budgets[yr];
  renderBudgetYears();
  setMsg('set-msg', `已刪除 ${yr}年，請記得儲存設定`, false);
}

function onByrInput(yr, key, val) {
  if (!subjects.settings.budgets?.[yr]) return;
  subjects.settings.budgets[yr][key] = parseInt(val) || 0;
}

function syncBudgetYearInputs() {
  /* 強制同步 DOM → subjects（防止 oninput 漏更新的情況） */
  const budgets = subjects.settings.budgets || {};
  Object.keys(budgets).forEach(yr => {
    BUDGET_YEAR_FIELDS.forEach(f => {
      const el = document.getElementById(`byr-${yr}-${f.key}`);
      if (el) budgets[yr][f.key] = parseInt(el.value) || 0;
    });
  });
}

/* ════════════════════
   SETTINGS
   ════════════════════ */
function fillSettings() {
  if (!subjects) return;
  document.getElementById('set-org').value       = subjects.settings?.orgName        || '';
  document.getElementById('set-threshold').value = subjects.settings?.exemptThreshold ?? 10000;
  document.getElementById('set-nhi-9a').value    = subjects.settings?.nhiThreshold9A  ?? 20000;
  document.getElementById('set-tax-9a').value    = subjects.settings?.taxThreshold9A  ?? 20010;
  document.getElementById('set-part50').value    = subjects.settings?.part50Threshold ?? 29500;
  /* 自動填入文字 */
  const at = subjects.settings?.autoText || {};
  document.getElementById('set-text-2706name').value    = at.item2706Name  || '';
  document.getElementById('set-text-2706price').value   = at.item2706Price || '';
  document.getElementById('set-text-transferfee').value = at.transferFee   || '';
  document.getElementById('set-text-income50').value    = at.income50      || '';
  document.getElementById('set-text-income50nhi').value = at.income50nhi   || '';
  document.getElementById('set-text-income92').value    = at.income92      || '';
  document.getElementById('set-text-income9a').value    = at.income9a      || '';
  document.getElementById('set-text-overtime').value    = at.overtime      || '';

  /* ── 年度預算：若舊版扁平鍵存在，遷移至 budgets['115'] ── */
  const s = subjects.settings || {};
  if (!s.budgets) {
    s.budgets = {};
    subjects.settings.budgets = s.budgets;
  }
  if (!s.budgets['115'] && (s.budget1301 !== undefined || s.budget2807_total !== undefined)) {
    s.budgets['115'] = {
      b1301:        s.budget1301          ?? 140000,
      b2807_public: s.budget2807_public   ?? 60000,
      b2807_health: s.budget2807_health   ?? 210635,
      b2807_clinic: s.budget2807_clinic   ?? 137135,
      b2807_invoice:s.budget2807_invoice  ?? 2600,
      b2807_hpv:    s.budget2807_hpv      ?? 0,
      b2807_total:  s.budget2807_total    ?? 410370,
    };
  }
  if (!s.budgets['115']) {
    s.budgets['115'] = {};
    BUDGET_YEAR_FIELDS.forEach(f => { s.budgets['115'][f.key] = f.def; });
  }
  renderBudgetYears();
}

async function saveSettings() {
  if (!subjects) return;
  subjects.settings = subjects.settings || {};
  subjects.settings.orgName         = document.getElementById('set-org').value;
  subjects.settings.exemptThreshold = parseInt(document.getElementById('set-threshold').value) || 10000;
  subjects.settings.nhiThreshold9A  = parseInt(document.getElementById('set-nhi-9a').value)    || 20000;
  subjects.settings.taxThreshold9A  = parseInt(document.getElementById('set-tax-9a').value)    || 20010;
  subjects.settings.part50Threshold = parseInt(document.getElementById('set-part50').value)    || 29500;
  /* 自動填入文字 */
  const _atKeys = {
    item2706Name:  'set-text-2706name',  item2706Price: 'set-text-2706price',
    transferFee:   'set-text-transferfee', income50:    'set-text-income50',
    income50nhi:   'set-text-income50nhi', income92:    'set-text-income92',
    income9a:      'set-text-income9a',    overtime:    'set-text-overtime',
  };
  const at = {};
  Object.entries(_atKeys).forEach(([k, id]) => {
    const val = document.getElementById(id)?.value.trim();
    if (val) at[k] = val;
  });
  subjects.settings.autoText = at;
  /* 同步所有年度欄位至 subjects.settings.budgets */
  syncBudgetYearInputs();
  /* backward-compat: 寫回 115年扁平鍵供舊版 index.html 讀取 */
  const y115 = subjects.settings.budgets?.['115'];
  if (y115) {
    subjects.settings.budget1301          = y115.b1301        ?? 140000;
    subjects.settings.budget2807_public   = y115.b2807_public ?? 60000;
    subjects.settings.budget2807_health   = y115.b2807_health ?? 210635;
    subjects.settings.budget2807_clinic   = y115.b2807_clinic ?? 137135;
    subjects.settings.budget2807_invoice  = y115.b2807_invoice?? 2600;
    subjects.settings.budget2807_hpv      = y115.b2807_hpv    ?? 0;
    subjects.settings.budget2807_total    = y115.b2807_total  ?? 410370;
  }
  setMsg('set-msg', '⟳ 儲存中…', false);
  try {
    const r = await fetch('/api/subjects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Pass': PASS },
      body: JSON.stringify(subjects),
    });
    const res = await r.json();
    setMsg('set-msg', res.ok ? '✓ 已儲存' : '❌ 失敗', !res.ok);
  } catch (_) { setMsg('set-msg', '❌ 連線失敗', true); }
}

/* ════════════════════
   MODAL
   ════════════════════ */
function openModal(title, bodyHtml, okCallback) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  modalCb = okCallback;
  document.getElementById('modal-bg').classList.add('open');
  /* focus first input */
  setTimeout(() => document.querySelector('#modal-body input')?.focus(), 50);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function modalOk()    { if (modalCb) { if (modalCb() === false) return; } closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ════════════════════
   UTILS
   ════════════════════ */
function v(id)    { return document.getElementById(id)?.value.trim() || ''; }
function esc(s)   { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtN(n)  { return Number(n).toLocaleString('zh-TW'); }
function setMsg(id, text, isErr) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = isErr ? 'toolbar-err' : 'toolbar-msg';
  if (!isErr && text.startsWith('✓')) setTimeout(() => { if(el.textContent===text) el.textContent=''; }, 3000);
}

/* ════════════════════
   CSS 動畫彈窗（取代 alert / confirm / prompt）
   ════════════════════ */
let _admAlertCb   = null;
let _admConfirmCb = null;
let _admPromptCb  = null;

function showAdminAlert(msg) {
  return new Promise(resolve => {
    _admAlertCb = resolve;
    document.getElementById('adm-alert-msg').innerHTML = msg;
    document.getElementById('adm-alert-modal').style.display = '';
  });
}
function closeAdminAlert() {
  document.getElementById('adm-alert-modal').style.display = 'none';
  if (_admAlertCb) { _admAlertCb(); _admAlertCb = null; }
}

function showAdminConfirm(msg) {
  return new Promise(resolve => {
    _admConfirmCb = resolve;
    document.getElementById('adm-confirm-msg').innerHTML = msg;
    document.getElementById('adm-confirm-modal').style.display = '';
  });
}
function resolveAdminConfirm(val) {
  document.getElementById('adm-confirm-modal').style.display = 'none';
  if (_admConfirmCb) { _admConfirmCb(val); _admConfirmCb = null; }
}

function showAdminPrompt(msg, def = '') {
  return new Promise(resolve => {
    _admPromptCb = resolve;
    document.getElementById('adm-prompt-label').innerHTML = msg;
    document.getElementById('adm-prompt-input').value = def;
    document.getElementById('adm-prompt-modal').style.display = '';
    setTimeout(() => document.getElementById('adm-prompt-input').focus(), 60);
  });
}
function resolveAdminPrompt(ok) {
  const val = ok ? document.getElementById('adm-prompt-input').value : null;
  document.getElementById('adm-prompt-modal').style.display = 'none';
  if (_admPromptCb) { _admPromptCb(val); _admPromptCb = null; }
}
