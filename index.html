<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採購(費用動支)申請單 － 臺南市佳里區衛生所</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: '標楷體','DFKai-SB','BiauKai','KaiTi',serif;
  font-size: 13px; background: #e8eaf0; color: #111;
}

/* ══════════════════════════════════
   SCREEN LAYOUT
   ══════════════════════════════════ */
#app { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: 260px; min-width: 260px;
  background: #1e2a38; color: #dde3ea;
  display: flex; flex-direction: column;
  height: 100vh; position: sticky; top: 0; overflow: hidden;
}
#sb-header {
  padding: 13px 14px 10px; border-bottom: 1px solid #2e3f52; flex-shrink: 0;
}
#sb-header h2 { font-size: 15px; color: #e8edf2; margin-bottom: 8px; letter-spacing: 1px; }
#sb-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
#sb-version {
  font-size: 12px; color: #90a4ae; margin-bottom: 8px;
  background: #162230; border-radius: 4px;
  padding: 2px 7px; display: inline-block; letter-spacing: 1px;
}
#admin-link {
  padding: 5px 12px; background: #1565c0; color: #fff;
  border: none; border-radius: 5px; font-size: 12px;
  font-family: inherit; cursor: pointer; text-decoration: none;
  white-space: nowrap;
}
#admin-link:hover { background: #1976d2; }
#sb-btns { display: flex; flex-direction: column; gap: 5px; }
.new-btn {
  width: 100%; padding: 7px 0; color: #fff;
  border: none; border-radius: 5px;
  font-size: 13px; font-family: inherit; cursor: pointer; letter-spacing: 1px;
}
#new-purchase { background: #1565c0; }
#new-purchase:hover { background: #1976d2; }
#new-expense  { background: #6a1b9a; }
#new-expense:hover  { background: #7b1fa2; }

/* sync status */
#sync-status {
  font-size: 10px; padding: 4px 14px 5px;
  color: #78909c; border-bottom: 1px solid #2e3f52; flex-shrink: 0;
}
#sync-status.ok   { color: #66bb6a; }
#sync-status.err  { color: #ef5350; }
#sync-status.busy { color: #ffd54f; }

#history-scroll { flex: 1; overflow-y: auto; padding: 8px 10px; }
#no-history { color: #607d8b; font-size: 12px; text-align: center; padding: 24px 0; }

.h-item {
  background: #263545; border-radius: 5px; padding: 8px 10px;
  margin-bottom: 7px; cursor: pointer; border-left: 3px solid #1976d2;
  position: relative;
}
.h-item:hover  { background: #2d3f52; }
.h-item.active { border-left-color: #ffd54f; }
.h-item.expense { border-left-color: #7b1fa2; }
.h-item.expense.active { border-left-color: #ce93d8; }
.h-date   { font-size: 10px; color: #78909c; margin-bottom: 2px; }
.h-title  { font-size: 12px; font-weight: bold; color: #cfd8dc; margin-bottom: 2px; }
.h-amount { font-size: 12px; color: #66bb6a; }
.h-del {
  position: absolute; top: 7px; right: 8px;
  background: #c62828; color: #fff; border: none; border-radius: 3px;
  font-size: 10px; padding: 1px 5px; cursor: pointer;
}
.h-del:hover { background: #e53935; }

/* ── Main ── */
#main { flex: 1; padding: 16px 22px; overflow-x: auto; }
#actions { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.btn {
  padding: 7px 18px; border: none; border-radius: 5px;
  font-size: 13px; font-family: inherit; cursor: pointer;
}
.btn-save  { background: #1565c0; color: #fff; }
.btn-save:hover  { background: #1976d2; }
.btn-print { background: #6a1b9a; color: #fff; }
.btn-print:hover { background: #7b1fa2; }
.btn-clear { background: #546e7a; color: #fff; }
.btn-clear:hover { background: #607d8b; }
#save-msg { font-size: 12px; color: #43a047; margin-left: 4px; }

/* Toast */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #323232; color: #fff; padding: 10px 22px; border-radius: 6px;
  font-size: 13px; z-index: 9999; opacity: 0; transition: opacity .3s;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ══════════════════════════════════
   FORM PAGE  (A4)
   ══════════════════════════════════ */
#form-page {
  background: #fff; width: 100%; max-width: 960px; min-height: 297mm;
  padding: 7mm 10mm 5mm 10mm;
  box-shadow: 0 3px 12px rgba(0,0,0,.25);
  font-family: '標楷體','DFKai-SB','BiauKai','KaiTi',serif;
  font-size: 12px;
  position: relative;
}
.fi  { border: none; border-bottom: 1px solid #555; background: transparent;
       font-family: inherit; font-size: inherit; outline: none; width: 100%; }
.fta { border: none; background: transparent; font-family: inherit;
       font-size: inherit; outline: none; width: 100%; resize: none;
       overflow: hidden; line-height: 1.45; }
.fsel {
  border: 1.5px solid #1565c0; border-radius: 4px;
  background: #eef4fd; color: #111;
  font-family: inherit; font-size: 12px; font-weight: bold;
  padding: 2px 4px; outline: none;
  cursor: pointer; max-width: 100%;
}
.fsel:hover { background: #dce8fb; }
.fsel:focus { border-color: #0d47a1; box-shadow: 0 0 0 2px rgba(21,101,192,.2); }

/* Type badge（點擊切換） */
#type-badge {
  position: absolute; top: 3mm; right: 4mm;
  background: #1565c0; color: #fff;
  font-size: 14px; font-weight: bold;
  padding: 4px 16px; border-radius: 5px;
  letter-spacing: 2px; cursor: pointer;
  user-select: none; transition: background .15s;
}
#type-badge:hover { background: #1976d2; }
#type-badge.expense { background: #6a1b9a; }
#type-badge.expense:hover { background: #7b1fa2; }
@media print { #type-badge { cursor: default; } }

/* ── Upper section ── */
.u-header { display: flex; align-items: flex-start; margin-bottom: 1.5mm; }
.u-main-acct { font-size: 13px; font-weight: bold; min-width: 18mm; padding-top: 3mm; white-space: nowrap; }
.u-title-wrap { flex: 1; text-align: center; }
.u-org  { font-size: 19px; font-weight: bold; letter-spacing: 3px; }
.u-sub  { font-size: 12.5px; text-decoration: underline; margin-top: 1mm; }

/* Upper table: 憑證編號 | 預算科目 | 金額 | 用途說明 */
.ut { width: 100%; border-collapse: collapse; }
.ut td { border: 1px solid #333; vertical-align: top; padding: 1.5mm 2mm; }
.cell-lbl { font-size: 11px; color: #222; font-weight: bold; margin-bottom: 1.5mm; display: block; }
.bp-row { display: flex; align-items: center; margin: 1.2mm 0; font-size: 11.5px; gap: 2mm; }
.bp-row label { min-width: 14mm; font-size: 11px; color: #444; flex-shrink: 0; }
.amount-num { font-size: 20px; font-weight: bold; text-align: center; margin-top: 1.5mm; }

/* Signature grid */
.sg { width: 100%; border-collapse: collapse; border-top: none; }
.sg td {
  border: 1px solid #333; text-align: center;
  vertical-align: top; font-size: 11px; padding: 2mm 1mm; height: 22mm;
}
/* Slash overlay for cells that are N/A */
.sg td.slash {
  background: linear-gradient(to bottom right,
    transparent calc(50% - .6px), #888 calc(50% - .6px),
    #888 calc(50% + .6px), transparent calc(50% + .6px));
}

/* Cut line */
.cut-line {
  text-align: center; font-size: 9.5px; color: #888;
  margin: 2mm 0; letter-spacing: 4px; user-select: none;
}

/* ── Lower section ── */
.lower-wrap { width: 100%; border-collapse: collapse; }
.lower-wrap > tbody > tr > td { vertical-align: top; }
.lower-left  { border: 1px solid #333; }
.lower-right {
  border: 1px solid #333; border-left: none;
  width: 28mm; padding: 1.5mm 2mm; font-size: 11px; vertical-align: top;
}
.l-top-bar  { display: flex; border-bottom: 1px solid #333; align-items: center; }
.l-top-title { font-size: 13px; font-weight: bold; padding: 1.5mm 3mm; }
.l-unit-row { display: flex; border-bottom: 1px solid #333; font-size: 11.5px; }
.l-unit-cell { padding: 1.5mm 3mm; display: flex; align-items: center; gap: 3mm; }
.l-date-cell {
  padding: 1.5mm 3mm; border-left: 1px solid #333;
  display: flex; align-items: center; gap: 2mm; margin-left: auto;
}
.it { width: 100%; border-collapse: collapse; }
.it th, .it td { border: 1px solid #333; padding: 1mm 1.5mm; font-size: 11px; text-align: center; vertical-align: top; }
.it th { background: #f5f5f5; font-size: 10.5px; vertical-align: middle; }
.it td.td-name, .it td.td-spec { text-align: left; }
.it td input {
  width: 100%; border: none; background: transparent;
  font-family: inherit; font-size: 11px; outline: none;
}
.it td.td-name input, .it td.td-spec input { text-align: left; }
.it td.td-r { text-align: right; }
.it td.td-r input { text-align: right; }
.it tfoot td { font-weight: bold; background: #f5f5f5; font-size: 12px; vertical-align: middle; }
.it tfoot td { height: 7mm; }


/* Add / Remove row buttons */
#row-btns { display: flex; border-top: none; }
#add-row-btn, #del-row-btn {
  flex: 1; border: 1px dashed #b0bec5; background: #fafafa;
  font-size: 11px; padding: 3px 0; cursor: pointer; font-family: inherit;
}
#add-row-btn { color: #2e7d32; border-right: none; }
#add-row-btn:hover { background: #e8f5e9; border-color: #66bb6a; }
#del-row-btn { color: #c62828; }
#del-row-btn:hover { background: #fce4ec; border-color: #ef9a9a; }

/* ── Bottom signatures ── */
.bs { width: 100%; border-collapse: collapse; border-top: none; }
.bs td {
  border: 1px solid #333; text-align: center; font-size: 11px;
  vertical-align: top; padding: 2mm 1mm;
}
.bs tr.label-row td { height: 6mm; vertical-align: top; padding-top: 2mm; }
.bs tr.sig-box td { height: 22mm; vertical-align: top; }
.bs tr.exempt-row td {
  height: 8mm; font-size: 12px; font-weight: bold;
  vertical-align: middle; border-top: 1px solid #333;
}
.hidden-cell { visibility: hidden; }
.notes-lbl { font-size: 11px; font-weight: bold; margin-bottom: 1.5mm; }

/* ── Form inactive overlay ── */
#form-page.inactive { pointer-events: none; }
#form-page.inactive::after {
  content: '請選左上「新增請購單」或「新增動支單」開始填單';
  position: absolute; inset: 0; z-index: 10;
  background: rgba(220,225,232,0.72);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: bold; color: #37474f;
  letter-spacing: 2px; border-radius: 0;
  font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
  text-align: center; padding: 0 20px;
}

/* purchase-sig: only for 請購單 + >= threshold */
#purchase-sig { display: none; }
/* exempt-wrap: 請購<threshold OR 動支>0 */
#exempt-wrap  { display: none; }

/* ══════════════════════════════════
   PRINT
   ══════════════════════════════════ */
@media print {
  @page { size: A4 portrait; margin: 0; }
  body { background: #fff; }
  #app  { display: block; }
  #sidebar, #actions, #toast, #add-row-btn { display: none !important; }
  #main { padding: 0; }
  #form-page {
    width: 210mm !important; max-width: 210mm !important;
    height: 297mm; min-height: unset;
    padding: 7mm 7mm 5mm 7mm; box-shadow: none;
    display: flex; flex-direction: column;
  }
  .fi   { border-bottom-color: transparent; }
  .fsel {
    border-color: transparent; background: transparent;
    -webkit-appearance: none; appearance: none;
    font-weight: normal; padding: 0; box-shadow: none;
  }
  .fta  { border-bottom-color: transparent; }
  #apply-date-input { display: none; }
  #roc-date-text    { display: inline !important; }
  /* Items stretch to fill page */
  .it tbody tr { height: 9mm; }
  /* Lower section flex-fills remaining space */
  #lower-section { flex: 1; display: flex; flex-direction: column; }
  .lower-wrap { flex: 1; }
  .lower-left { height: 100%; }
  .bs tr.sig-box td { height: 24mm; }
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">

<!-- ══════════════════════ SIDEBAR ══════════════════════ -->
<aside id="sidebar">
  <div id="sb-header">
    <div id="sb-top">
      <h2>⚙ 動支管理系統</h2>
      <a id="admin-link" href="admin.html">管理入口</a>
    </div>
    <div id="sb-version">v1.2.6</div>
    <div id="sb-btns">
      <button class="new-btn" id="new-purchase" onclick="newForm('purchase')">📄 新增請購單</button>
      <button class="new-btn" id="new-expense"  onclick="newForm('expense')">📄 新增動支單</button>
    </div>
  </div>
  <div id="sync-status">● 連線中…</div>
  <div style="font-size:10px; color:#4a6278; padding:5px 14px 2px; flex-shrink:0;">📋 歷史紀錄</div>
  <div id="history-scroll">
    <div id="no-history">載入中…</div>
  </div>
</aside>

<!-- ══════════════════════ MAIN ══════════════════════ -->
<div id="main">
  <div id="actions">
    <button class="btn btn-save"  onclick="saveRecord()" id="save-btn" style="display:none;">💾 存檔取號</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ 列印</button>
    <button class="btn btn-clear" onclick="clearForm()">🗑️ 清除</button>
    <button class="btn" id="cancel-btn" onclick="cancelEdit()"
            style="background:#b71c1c; color:#fff; display:none;">✕ 取消</button>
    <span id="save-msg"></span>
  </div>

  <!-- ══ FORM PAGE ══ -->
  <div id="form-page">

    <!-- 單據類型徽章（右上角，點擊切換） -->
    <div id="type-badge" onclick="toggleType()" title="點擊切換類型">請購單</div>

    <!-- ── Upper: 憑證用紙 ── -->
    <div class="u-header">
      <div class="u-main-acct" id="main-acct-lbl">請選擇</div>
      <div class="u-title-wrap">
        <div class="u-org" id="org-name">臺南市佳里區衛生所</div>
        <div class="u-sub" id="form-subtitle">採購申請單暨黏貼憑證用紙</div>
      </div>
    </div>

    <table class="ut">
      <colgroup>
        <col style="width:20mm">
        <col style="width:68mm">
        <col style="width:20mm">
        <col><!-- 用途說明 佔剩餘空間 -->
      </colgroup>
      <tr>
        <td style="text-align:center; vertical-align:top;">
          <span class="cell-lbl">憑證編號</span>
          <input class="fi" id="voucher-no" type="text"
                 style="text-align:center; font-size:11px; margin-top:2mm;">
        </td>
        <td>
          <span class="cell-lbl">預算科目</span>
          <div class="bp-row">
            <label>業務計畫：</label>
            <select class="fsel" id="sel-main" onchange="onMainChange()"
                    style="width:22mm; margin-right:2mm;">
              <option value="">── 主科目 ──</option>
            </select>
            <select class="fsel" id="sel-bp" onchange="onBpChange()"
                    style="flex:1; display:none;">
            </select>
          </div>
          <div class="bp-row">
            <label>工作計畫：</label>
            <span id="wp-text" style="font-size:11.5px;"></span>
          </div>
          <div class="bp-row" id="row-purpose" style="display:none;">
            <label>用途別　：</label>
            <select class="fsel" id="sel-purpose" style="flex:1;"></select>
          </div>
        </td>
        <td style="text-align:center; vertical-align:top;">
          <span class="cell-lbl">金額</span>
          <div class="amount-num" id="amount-disp">$0</div>
        </td>
        <td>
          <span class="cell-lbl">用途說明</span>
          <textarea class="fta" id="purpose-desc" rows="4"
                    style="font-size:11.5px; min-height:18mm;"></textarea>
        </td>
      </tr>
    </table>

    <!-- ── 上方核章格 ── -->
    <!--
      請購單：全部空白（每格均需蓋章）
      動支單：保管(id=sg-custody)、採購(id=sg-purchase)、財物登記(id=sg-financial) 三格加斜線
    -->
    <table class="sg">
      <colgroup>
        <col style="width:22%"><col style="width:14%"><col style="width:22%">
        <col style="width:22%"><col style="width:20%">
      </colgroup>
      <tr>
        <td>經(承)辦單位</td>
        <td id="sg-purchase">採購</td>
        <td id="sg-financial" style="font-size:10px;">
          財物或軟體登記<br><span style="font-size:9px;">(備註財物/軟體編)</span>
        </td>
        <td rowspan="2" style="vertical-align:top; padding-top:2mm;">主(會)計單位</td>
        <td rowspan="2" style="vertical-align:top; padding-top:2mm;">機關長官</td>
      </tr>
      <tr>
        <td id="sg-custody">保管</td>
        <td>驗收</td>
        <td>出納單位</td>
      </tr>
    </table>

    <div class="cut-line">─────────────憑─────────證─────────粘─────────貼─────────線─────────</div>

    <!-- ── Lower: 採購/動支 ── -->
    <div id="lower-section">
      <table class="lower-wrap"><tbody><tr>
        <td class="lower-left">
          <div class="l-top-bar">
            <div class="l-top-title" id="lower-title">採購</div>
          </div>
          <div class="l-unit-row">
            <div class="l-unit-cell">
              <span>單位</span>
              <span style="font-weight:bold;" id="unit-name">臺南市佳里區衛生所</span>
            </div>
            <div class="l-date-cell">
              <span>申請日期</span>
              <input type="date" id="apply-date-input" class="fi"
                     style="width:30mm; font-size:11px;" onchange="updateRocDate()">
              <span id="roc-date-text" style="font-size:11.5px; display:none;"></span>
            </div>
          </div>
          <table class="it">
            <thead>
              <tr>
                <th rowspan="2" style="width:30%;" id="item-col-hdr">採購品名</th>
                <th rowspan="2" style="width:20%;">規格（樣式）</th>
                <th rowspan="2" style="width:8%;">數量</th>
                <th rowspan="2" style="width:8%;">單位</th>
                <th colspan="2">預估金額</th>
              </tr>
              <tr>
                <th style="width:17%;">單價</th>
                <th style="width:17%;">總額</th>
              </tr>
            </thead>
            <tbody id="items-body"></tbody>
            <tfoot>
              <tr>
                <td colspan="4" style="text-align:center;">合計</td>
                <td></td>
                <td class="td-r" id="grand-total" style="padding-right:3mm;">$0</td>
              </tr>
            </tfoot>
          </table>
          <div id="row-btns">
            <button id="add-row-btn" onclick="addRow()">＋ 新增明細列</button>
            <button id="del-row-btn" onclick="delRow()">－ 減少明細列</button>
          </div>
        </td>
        <td class="lower-right">
          <div class="notes-lbl">其他說明事項</div>
          <textarea class="fta" id="notes"
                    style="min-height:52mm; font-size:11px;" rows="14"></textarea>
        </td>
      </tr></tbody></table>

      <!-- 請購單 + 金額 >= 門檻 才顯示正式簽章列 -->
      <div id="purchase-sig">
        <table class="bs">
          <tr class="label-row">
            <td>請購單位</td><td>採購單位</td><td>主(會)計單位</td><td>機關長官</td>
          </tr>
          <tr class="sig-box"><td></td><td></td><td></td><td></td></tr>
        </table>
      </div>

      <!-- 免核章：請購單 0<金額<門檻，或 動支單 金額>0 -->
      <div id="exempt-wrap">
        <table class="bs">
          <tr class="exempt-row">
            <td id="ex1"></td><td id="ex2"></td>
            <td id="ex3"></td><td id="ex4"></td>
          </tr>
        </table>
      </div>
    </div><!-- /#lower-section -->

  </div><!-- /#form-page -->
</div><!-- /#main -->
</div><!-- /#app -->

<!-- ══════════════════════ JAVASCRIPT ══════════════════════ -->
<script>
'use strict';

let CFG       = { settings:{ orgName:'臺南市佳里區衛生所', exemptThreshold:10000 }, mainAccounts:[] };
let currentId = null;
let formType  = 'purchase';   /* 'purchase' | 'expense' */
let rowCount  = 10;
let cachedRecords = [];
const API = '/api/records';

/* ══════════════════════
   INIT
   ══════════════════════ */
(async function init() {
  /* 優先 API，失敗讀靜態檔 */
  try {
    const r1 = await fetch('/api/subjects');
    if (r1.ok) {
      const d = await r1.json();
      if (d && d.mainAccounts) CFG = d; else throw 0;
    } else throw 0;
  } catch(_) {
    try {
      const r2 = await fetch('subjects.json');
      if (r2.ok) CFG = await r2.json();
    } catch(_) {}
  }

  const org = CFG.settings?.orgName || '臺南市佳里區衛生所';
  document.getElementById('org-name').textContent  = org;
  document.getElementById('unit-name').textContent = org;

  buildMainDropdown();
  generateItemRows();
  setTodayDate();
  calcTotal();
  /* 初始狀態：表單反灰，等待使用者點選 */
  document.getElementById('form-page').classList.add('inactive');
  await loadHistory();
})();

/* ══════════════════════
   FORM TYPE
   ══════════════════════ */
function toggleType() {
  /* 切換類型，保留表單資料 */
  applyType(formType === 'purchase' ? 'expense' : 'purchase');
  /* 更新草稿列（如有）的類型標示 */
  const draft = document.getElementById('draft-item');
  if (draft) {
    draft.className = 'h-item active' + (formType==='expense'?' expense':'');
    draft.querySelector('.h-date').textContent =
      (formType==='expense'?'[動支]':'[採購]') + '　編輯中';
  }
}

function applyType(type) {
  formType = type;
  const isPurchase = type === 'purchase';

  /* 徽章 */
  const badge = document.getElementById('type-badge');
  badge.textContent = isPurchase ? '請購單' : '動支單';
  badge.className   = isPurchase ? '' : 'expense';

  /* 副標題 */
  document.getElementById('form-subtitle').textContent =
    isPurchase ? '採購申請單暨黏貼憑證用紙' : '費用動支申請單暨黏貼憑證用紙';

  /* 下方標題 */
  document.getElementById('lower-title').textContent = isPurchase ? '採購' : '動支';

  /* 表格第一欄標題 */
  document.getElementById('item-col-hdr').textContent = isPurchase ? '採購品名' : '動支細項';

  /* 上方核章斜線：動支單 → 保管/採購/財物登記 三格加斜線 */
  ['sg-custody','sg-purchase','sg-financial'].forEach(id => {
    document.getElementById(id).classList.toggle('slash', !isPurchase);
  });

  calcTotal();
}

/* ══════════════════════
   API HELPERS
   ══════════════════════ */
async function apiGet()       { const r=await fetch(API); if(!r.ok) throw 0; return r.json(); }
async function apiPost(data)  {
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok) throw 0; return r.json();
}

function setSyncStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg; el.className = cls || '';
}

async function loadHistory() {
  setSyncStatus('⟳ 載入中…', 'busy');
  try {
    cachedRecords = await apiGet();
    setSyncStatus(`● 已連線　共 ${cachedRecords.length} 筆`, 'ok');
    renderHistory(cachedRecords);
  } catch(_) {
    setSyncStatus('● 連線失敗，請確認網路', 'err');
    renderHistory([]);
  }
}

/* ══════════════════════
   AUTO VOUCHER
   ══════════════════════ */
function generateVoucherNo(records) {
  const rocYear = new Date().getFullYear() - 1911;
  const prefix  = String(rocYear) + '-';
  let max = 0;
  (records||[]).forEach(r => {
    if (r.voucherNo && r.voucherNo.startsWith(prefix)) {
      const n = parseInt(r.voucherNo.slice(prefix.length), 10);
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return prefix + String(max + 1).padStart(4, '0');
}

/* ══════════════════════
   EXPORT CSV
   ══════════════════════ */
async function exportCSV() {
  setSyncStatus('⟳ 匯出中…', 'busy');
  try {
    const records = await apiGet();
    if (!records.length) { showToast('目前無紀錄可匯出'); setSyncStatus(`● 已連線　共 0 筆`,'ok'); return; }
    const hdr = ['憑證編號','類型','申請日期','主科目代碼','主科目名稱','業務計畫代碼','業務計畫','用途別代碼','用途說明','金額','儲存時間'];
    const rows = records.map(r=>[r.voucherNo||'',r.formType==='expense'?'動支單':'請購單',
      r.applyDateRoc||r.applyDateRaw||'',r.acctCode||'',r.acctName||'',r.bpCode||'',
      r.bpLabel||'',r.purposeCode||'',r.purposeDesc||'',r.total||0,r.savedAt||'']
      .map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
    const csv = '\uFEFF' + hdr.join(',') + '\n' + rows.join('\n');
    const a = Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),
      download:'動支申請紀錄_'+new Date().toISOString().slice(0,10)+'.csv'});
    a.click(); URL.revokeObjectURL(a.href);
    setSyncStatus(`● 已連線　共 ${records.length} 筆`,'ok');
    showToast('✓ 已匯出 CSV');
  } catch(_) { setSyncStatus('● 連線失敗','err'); showToast('✗ 匯出失敗'); }
}

/* ══════════════════════
   CASCADING DROPDOWNS
   ══════════════════════ */
function buildMainDropdown() {
  const sel = document.getElementById('sel-main');
  sel.innerHTML = '<option value="">── 選擇主科目 ──</option>';
  CFG.mainAccounts.forEach(a => sel.appendChild(new Option(a.name, a.code)));
  onMainChange();
}

function onMainChange() {
  const code = document.getElementById('sel-main').value;
  const acct = CFG.mainAccounts.find(a=>a.code===code);
  document.getElementById('main-acct-lbl').textContent = acct ? acct.name : '請選擇';
  const bpSel = document.getElementById('sel-bp');
  bpSel.innerHTML = '<option value="">── 選擇業務計畫 ──</option>';
  if (acct) {
    acct.businessPlans.forEach(bp => bpSel.appendChild(new Option(bp.code+'　'+bp.name, bp.code)));
    bpSel.style.display = '';
  } else { bpSel.style.display = 'none'; }
  document.getElementById('wp-text').textContent = '';
  document.getElementById('sel-purpose').innerHTML = '';
  document.getElementById('row-purpose').style.display = 'none';
}

function onBpChange() {
  const acct = CFG.mainAccounts.find(a=>a.code===document.getElementById('sel-main').value);
  const bp   = acct ? acct.businessPlans.find(b=>b.code===document.getElementById('sel-bp').value) : null;
  document.getElementById('wp-text').textContent = bp ? bp.workPlan : '';
  const pSel = document.getElementById('sel-purpose');
  const pRow = document.getElementById('row-purpose');
  pSel.innerHTML = '<option value="">── 選擇用途別 ──</option>';
  if (bp && bp.purposes.length > 0) {
    bp.purposes.forEach(p => pSel.appendChild(new Option(p.code+'　'+p.name, p.code)));
    pRow.style.display = '';
  } else { pRow.style.display = 'none'; }
}

/* ══════════════════════
   ITEMS TABLE
   ══════════════════════ */
function generateItemRows() {
  document.getElementById('items-body').innerHTML = '';
  for (let i = 0; i < rowCount; i++) appendRow(i);
}

function appendRow(i) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="td-name"><input type="text"   data-r="${i}" data-c="name"></td>
    <td class="td-spec"><input type="text"   data-r="${i}" data-c="spec"></td>
    <td class="td-r"><input type="text" inputmode="decimal" data-r="${i}" data-c="qty" style="text-align:right;" oninput="validateQty(this,${i})"></td>
    <td style="text-align:center;"><input type="text" data-r="${i}" data-c="unit" style="text-align:center;"></td>
    <td class="td-r"><input type="number" data-r="${i}" data-c="price" min="0" step="1" oninput="calcRow(${i})"></td>
    <td class="td-r" id="sub${i}" style="padding-right:3mm;"></td>`;
  document.getElementById('items-body').appendChild(tr);
}

function addRow() {
  appendRow(rowCount);
  rowCount++;
}

function delRow() {
  if (rowCount <= 1) { showToast('至少保留一列'); return; }
  rowCount--;
  const tb = document.getElementById('items-body');
  if (tb.lastChild) tb.removeChild(tb.lastChild);
  const sub = document.getElementById('sub'+rowCount);
  if (sub) sub.remove();
  calcTotal();
}

function validateQty(el, i) {
  const raw = el.value.trim();
  if (raw !== '' && isNaN(Number(raw))) {
    alert('數量請輸入數字（例如：1、2.5）');
    el.value = '';
  }
  calcRow(i);
}

function calcRow(i) {
  const sub = Math.round((parseFloat(qv(i,'qty'))||0)*(parseFloat(qv(i,'price'))||0));
  document.getElementById('sub'+i).textContent = sub > 0 ? '$'+fmtN(sub) : '';
  calcTotal();
}

function calcTotal() {
  let total = 0;
  for (let i = 0; i < rowCount; i++)
    total += Math.round((parseFloat(qv(i,'qty'))||0)*(parseFloat(qv(i,'price'))||0));
  document.getElementById('amount-disp').textContent = '$'+fmtN(total);
  document.getElementById('grand-total').textContent  = '$'+fmtN(total);

  const threshold  = CFG.settings?.exemptThreshold || 10000;
  const isPurchase = formType === 'purchase';

  /* 下方正式簽章列：請購單 + 金額 >= 門檻 */
  document.getElementById('purchase-sig').style.display =
    (isPurchase && total >= threshold) ? 'block' : 'none';

  /* 免核章列：
     請購單：0 < 金額 < 門檻
     動支單：金額 > 0（不論金額，動支不需採購核章）*/
  const showExempt = isPurchase
    ? (total > 0 && total < threshold)
    : (total > 0);
  document.getElementById('exempt-wrap').style.display = showExempt ? 'block' : 'none';
}

/* ══════════════════════
   DATE
   ══════════════════════ */
function setTodayDate() {
  document.getElementById('apply-date-input').value = new Date().toISOString().slice(0,10);
  updateRocDate();
}
function updateRocDate() {
  const v = document.getElementById('apply-date-input').value;
  if (!v) return;
  const d = new Date(v+'T00:00:00');
  document.getElementById('roc-date-text').textContent =
    (d.getFullYear()-1911)+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}

/* ══════════════════════
   FORM DATA
   ══════════════════════ */
function getFormData() {
  const items = []; let total = 0;
  for (let i = 0; i < rowCount; i++) {
    const qty=qv(i,'qty'), price=qv(i,'price');
    items.push({name:qv(i,'name'),spec:qv(i,'spec'),qty,unit:qv(i,'unit'),price});
    total += Math.round((parseFloat(qty)||0)*(parseFloat(price)||0));
  }
  const acctCode = document.getElementById('sel-main').value;
  const bpCode   = document.getElementById('sel-bp').value;
  const acct = CFG.mainAccounts.find(a=>a.code===acctCode);
  const bp   = acct ? acct.businessPlans.find(b=>b.code===bpCode) : null;
  return {
    voucherNo   : document.getElementById('voucher-no').value,
    formType,
    acctCode, acctName  : acct ? acct.name : '',
    bpCode,   bpLabel   : bp   ? bp.code+'　'+bp.name : '',
    purposeCode : document.getElementById('sel-purpose').value,
    purposeDesc : document.getElementById('purpose-desc').value,
    applyDateRaw: document.getElementById('apply-date-input').value,
    applyDateRoc: document.getElementById('roc-date-text').textContent,
    notes: document.getElementById('notes').value,
    items, total
  };
}

function fillForm(rec) {
  document.getElementById('voucher-no').value         = rec.voucherNo   || '';
  document.getElementById('purpose-desc').value       = rec.purposeDesc || '';
  document.getElementById('notes').value              = rec.notes       || '';
  document.getElementById('apply-date-input').value   = rec.applyDateRaw || '';
  updateRocDate();
  applyType(rec.formType || 'purchase');
  document.getElementById('sel-main').value = rec.acctCode || '';
  onMainChange();
  document.getElementById('sel-bp').value   = rec.bpCode   || '';
  onBpChange();
  document.getElementById('sel-purpose').value = rec.purposeCode || '';
  /* 確保行數足夠 */
  const needed = (rec.items||[]).length;
  while (rowCount < Math.max(needed, 10)) { appendRow(rowCount); rowCount++; }
  for (let i=0;i<rowCount;i++) {
    const item = (rec.items||[])[i] || {};
    qi(i,'name').value=item.name||''; qi(i,'spec').value=item.spec||'';
    qi(i,'qty').value=item.qty||'';   qi(i,'unit').value=item.unit||'';
    qi(i,'price').value=item.price||'';
    if (document.getElementById('sub'+i)) calcRow(i);
  }
  calcTotal();
}

/* ══════════════════════
   SAVE / LOAD / DELETE
   ══════════════════════ */
async function saveRecord() {
  setSyncStatus('⟳ 儲存中…', 'busy');
  const data = getFormData();
  const now  = new Date();
  const ts   = `${now.getFullYear()-1911}/${pad(now.getMonth()+1)}/${pad(now.getDate())} `+
               `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  try {
    let records = await apiGet();
    if (currentId) {
      const idx = records.findIndex(r=>r.id===currentId);
      if (idx>=0) records[idx]={...data,id:currentId,savedAt:ts};
      else        records.push({...data,id:currentId,savedAt:ts});
    } else {
      if (!data.voucherNo) {
        data.voucherNo = generateVoucherNo(records);
        document.getElementById('voucher-no').value = data.voucherNo;
      }
      currentId = Date.now().toString();
      records.push({...data,id:currentId,savedAt:ts});
    }
    await apiPost(records);
    cachedRecords = records;
    setSyncStatus(`● 已儲存　共 ${records.length} 筆`,'ok');
    document.getElementById('draft-item')?.remove();
    renderHistory(records);
    showToast('✓ 已儲存 '+ts);
    showMsg('✓ 已儲存 '+ts);
  } catch(_) {
    setSyncStatus('● 儲存失敗','err');
    showToast('✗ 儲存失敗，請確認網路');
    showMsg('✗ 儲存失敗');
  }
}

async function deleteRecord(id, e) {
  e.stopPropagation();
  if (!confirm('確定刪除此筆紀錄？')) return;
  setSyncStatus('⟳ 刪除中…','busy');
  try {
    let records = await apiGet();
    records = records.filter(r=>r.id!==id);
    await apiPost(records);
    cachedRecords = records;
    if (currentId===id) currentId=null;
    setSyncStatus(`● 已刪除　共 ${records.length} 筆`,'ok');
    renderHistory(records);
  } catch(_) { setSyncStatus('● 刪除失敗','err'); }
}

async function loadRecord(id) {
  try {
    const records = await apiGet();
    const rec = records.find(r=>r.id===id);
    if (!rec) return;
    currentId = id;
    rowCount = 10;
    generateItemRows();
    fillForm(rec);
    /* 啟用表單 */
    document.getElementById('form-page').classList.remove('inactive');
    document.getElementById('save-btn').style.display = '';
    document.getElementById('cancel-btn').style.display = '';
    document.getElementById('draft-item')?.remove();
    document.querySelectorAll('.h-item').forEach(el=>
      el.classList.toggle('active', el.dataset.id===id));
  } catch(_) {}
}

function cancelEdit() {
  if (currentId) {
    /* 有既存紀錄：重新載入還原 */
    loadRecord(currentId);
  } else {
    /* 新單尚未儲存：回到初始反灰狀態 */
    currentId = null;
    document.getElementById('form-page').classList.add('inactive');
    document.getElementById('save-btn').style.display = 'none';
    document.getElementById('cancel-btn').style.display = 'none';
    document.getElementById('draft-item')?.remove();
    document.getElementById('save-msg').textContent = '';
    /* 若歷史清單空白則還原提示 */
    const wrap = document.getElementById('history-scroll');
    if (!wrap.querySelector('.h-item')) {
      wrap.innerHTML = '<div id="no-history">尚無紀錄</div>';
    }
  }
  showToast('已取消編輯');
}

function renderHistory(records) {
  const wrap = document.getElementById('history-scroll');
  if (!records||records.length===0) {
    wrap.innerHTML='<div id="no-history">尚無紀錄</div>'; return;
  }
  wrap.innerHTML='';
  [...records].reverse().forEach(rec => {
    const isExp = rec.formType==='expense';
    const div = document.createElement('div');
    div.className = 'h-item'+(rec.id===currentId?' active':'')+(isExp?' expense':'');
    div.dataset.id = rec.id;
    div.innerHTML = `
      <button class="h-del" onclick="deleteRecord('${rec.id}',event)">✕</button>
      <div class="h-date">${esc(rec.savedAt||'')}　${isExp?'[動支]':'[採購]'}</div>
      <div class="h-title">${esc(rec.voucherNo||'')} ${esc(rec.acctName)} / ${esc(rec.bpLabel)}</div>
      <div class="h-amount">$${fmtN(rec.total)}　${esc(rec.applyDateRoc||rec.applyDateRaw||'')}</div>`;
    div.onclick = () => loadRecord(rec.id);
    wrap.appendChild(div);
  });
}

function newForm(type) {
  currentId = null;
  rowCount = 10;
  document.getElementById('voucher-no').value = '';
  ['purpose-desc','notes'].forEach(id=>document.getElementById(id).value='');
  generateItemRows();
  applyType(type || 'purchase');
  setTodayDate(); buildMainDropdown(); calcTotal();
  document.getElementById('save-msg').textContent='';
  /* 啟用表單 */
  document.getElementById('form-page').classList.remove('inactive');
  document.getElementById('save-btn').style.display = '';
  document.getElementById('cancel-btn').style.display = '';
  /* 側欄顯示「編輯中未取號」草稿列 */
  renderDraftItem(type || 'purchase');
  showToast('📄 已開啟新' + (type==='expense'?'動支單':'請購單') + '，填寫後按「存檔取號」');
}

function renderDraftItem(type) {
  /* 移除舊草稿列（如有） */
  document.getElementById('draft-item')?.remove();
  document.querySelectorAll('.h-item').forEach(el=>el.classList.remove('active'));
  const wrap = document.getElementById('history-scroll');
  const div = document.createElement('div');
  div.id = 'draft-item';
  div.className = 'h-item active' + (type==='expense'?' expense':'');
  div.style.borderStyle = 'dashed';
  div.innerHTML = `
    <div class="h-date">${type==='expense'?'[動支]':'[採購]'}　編輯中</div>
    <div class="h-title" style="color:#ffd54f;">⚠ 未取號（尚未儲存）</div>
    <div class="h-amount" style="color:#90a4ae;">填寫完畢請按「存檔取號」</div>`;
  /* 插在最前面 */
  wrap.insertBefore(div, wrap.firstChild);
  /* 若只有「尚無紀錄」文字則移除 */
  document.getElementById('no-history')?.remove();
}

function clearForm() {
  if (!confirm('確定清除所有填入資料？')) return;
  newForm(formType);
}

/* ══════════════════════
   UTILS
   ══════════════════════ */
function qi(r,c)  { return document.querySelector(`[data-r="${r}"][data-c="${c}"]`); }
function qv(r,c)  { return qi(r,c)?.value||''; }
function fmtN(n)  { return Number(n).toLocaleString('zh-TW'); }
function pad(n)   { return String(n).padStart(2,'0'); }
function esc(s)   { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showMsg(t){ const el=document.getElementById('save-msg'); el.textContent=t; setTimeout(()=>el.textContent='',3500); }

let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}
</script>
