<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>ACC 傳票明細匯入 v4.4.1</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{font-family:system-ui,"Microsoft JhengHei",sans-serif;margin:0;padding:24px;background:#f5f6fa;color:#222}
  h1{font-size:20px;margin:0 0 12px}
  .card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .drop{border:2px dashed #64b5f6;background:#e3f2fd;color:#1565c0;border-radius:10px;padding:30px;text-align:center;font-size:16px;font-weight:600;cursor:pointer;transition:.15s}
  .drop:hover{background:#bbdefb}
  .drop.busy{background:#fff8e1;border-color:#ffa000;color:#e65100;cursor:wait}
  .drop.ok{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32}
  .drop.err{background:#ffebee;border-color:#ef5350;color:#c62828}
  .muted{color:#789;font-size:12px}
  .stat{display:inline-block;background:#eef;padding:4px 10px;border-radius:12px;margin:4px 4px 0 0;font-size:13px}
  .stat.ok{background:#d9f5d9;color:#1a6b1a}
  .stat.warn{background:#ffe9c7;color:#8a4a00}
  .stat.err{background:#f8d7d7;color:#8a1a1a}
  .back{color:#2d6cdf;text-decoration:none;font-size:14px}
</style>
</head>
<body>

<div class="row" style="justify-content:space-between">
  <h1>🧾 ACC 傳票明細 Excel 匯入</h1>
  <a href="acc.html" class="back">← 回 ACC 主頁</a>
</div>

<div class="card">
  <label for="file" class="drop" id="drop">
    📎 點此選擇 FNWFRX0090_*.xlsx — 自動解析並上傳到線上 D1
  </label>
  <input type="file" id="file" accept=".xlsx,.xls" style="display:none">
  <div class="muted" style="margin-top:8px">唯一鍵 (傳票編號, 分錄序號)：重複匯入同區間 = upsert，零重複計算</div>
</div>

<div class="card" id="result" style="display:none">
  <div id="stats"></div>
</div>

<script>
const $  = s => document.querySelector(s);
const drop = $('#drop');
const trim = s => String(s ?? '').trim();
const num  = s => s == null || s === '' ? 0 : (Math.round(Number(String(s).replace(/[,\s]/g,'')) || 0));

function ymFromDate(d) {
  const m = trim(d).match(/^(\d{3,4})\/(\d{1,2})\/\d{1,2}$/);
  return m ? m[1] + String(m[2]).padStart(2,'0') : '';
}

function parseExcel(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, defval:'' });
  let startIdx = 3;
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    if (trim(rows[i][0]).includes('製') && trim(rows[i][0]).includes('日')) { startIdx = i + 2; break; }
  }
  const out = []; const seqMap = {};
  for (let i = startIdx; i < rows.length; i += 2) {
    const r = rows[i]; const r2 = rows[i+1];
    if (!r || !trim(r[2])) continue;
    const voucher_no = trim(r[2]).replace(/\s/g,'');
    if (!/^\d{6,}$/.test(voucher_no)) continue;
    const voucher_type = trim((r2 && r2[2]) || '').replace(/\s/g,'');
    seqMap[voucher_no] = (seqMap[voucher_no] || 0) + 1;
    out.push({
      voucher_no, voucher_type,
      ym: ymFromDate(trim(r[0])),
      seq: seqMap[voucher_no],
      make_date: trim(r[0]), post_date: trim(r[1]),
      subject: trim(r[3]), sub_account: trim(r[4]),
      purpose: trim(r[5]), description: trim(r[6]),
      debit: num(r[7]), credit: num(r[8]),
      payee_info: trim(r[9]) || null, payee_amount: num(r[10]),
      source: 'excel_import',
    });
  }
  return out;
}

async function upload(rows) {
  const CHUNK = 500;
  let ins = 0, upd = 0;
  for (let i = 0; i < rows.length; i += CHUNK) {
    const chunk = rows.slice(i, i + CHUNK);
    const resp = await fetch('/api/acc/v2/entries', {
      method: 'PUT',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify(chunk),
    });
    const j = await resp.json();
    if (!resp.ok) throw new Error(j.error || ('HTTP ' + resp.status));
    ins += j.inserted || 0; upd += j.updated || 0;
  }
  return { inserted: ins, updated: upd };
}

function showResult(rows, uploadResult, error) {
  $('#result').style.display = 'block';
  if (error) {
    drop.className = 'drop err';
    drop.innerHTML = '❌ 失敗：' + error + ' — 點此重試';
    $('#stats').innerHTML = `<span class="stat err">${error}</span>`;
    return;
  }
  drop.className = 'drop ok';
  drop.innerHTML = '✅ 匯入完成 — 點此再匯入另一份';

  const byType = {}; const byVoucher = new Set();
  let deb = 0, cre = 0;
  for (const r of rows) {
    byType[r.voucher_type] = (byType[r.voucher_type] || 0) + 1;
    byVoucher.add(r.voucher_no);
    deb += r.debit; cre += r.credit;
  }
  const ymArr = [...new Set(rows.map(r => r.ym).filter(Boolean))].sort();
  $('#stats').innerHTML = [
    `<span class="stat ok">✅ 新增 ${uploadResult.inserted} 筆</span>`,
    `<span class="stat warn">~ 覆寫 ${uploadResult.updated} 筆</span>`,
    `<span class="stat">分錄合計 ${rows.length}</span>`,
    `<span class="stat">傳票 ${byVoucher.size} 張</span>`,
    ...Object.entries(byType).map(([t,n]) => `<span class="stat">${t} ${n}</span>`),
    `<span class="stat">借方 ${deb.toLocaleString()}</span>`,
    `<span class="stat">貸方 ${cre.toLocaleString()}</span>`,
    `<span class="stat ${deb===cre?'ok':'err'}">${deb===cre?'✓ 借貸平衡':'✗ 不平 '+(deb-cre)}</span>`,
    `<span class="stat">ym: ${ymArr.join(', ') || '(空)'}</span>`,
  ].join(' ');
}

$('#file').addEventListener('change', async (ev) => {
  const f = ev.target.files[0];
  if (!f) return;
  drop.className = 'drop busy';
  drop.innerHTML = '⏳ 解析 + 上傳中…（' + f.name + '）';
  $('#result').style.display = 'none';

  try {
    const buf = await f.arrayBuffer();
    const wb  = XLSX.read(buf, { type: 'array' });
    const rows = parseExcel(wb);
    if (!rows.length) throw new Error('沒有解析到任何分錄，請確認檔案格式');
    const result = await upload(rows);
    showResult(rows, result, null);
  } catch (e) {
    showResult([], null, e.message);
    console.error(e);
  } finally {
    ev.target.value = ''; // 允許重選同一個檔
  }
});
</script>
</body>
</html>
